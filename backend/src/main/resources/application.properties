# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/dabs
spring.datasource.username=root
spring.datasource.password=abc123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Firebase Auth Configuration (OAuth2 Resource Server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/dabs-40c16
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG